<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="112" fill="#121214" />
  
  <!-- Subtle circular background glow -->
  <circle cx="256" cy="256" r="180" fill="url(#bg-glow)" opacity="0.15" />
  
  <defs>
    <!-- Background Glow Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e2b874" />
      <stop offset="100%" stop-color="#121214" stop-opacity="0" />
    </radialGradient>

    <!-- Gold Gradients -->
    <linearGradient id="gold-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf5e6" />
      <stop offset="50%" stop-color="#e2b874" />
      <stop offset="100%" stop-color="#9d7e47" />
    </linearGradient>

    <linearGradient id="gold-secondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2b874" />
      <stop offset="100%" stop-color="#73592b" />
    </linearGradient>
  </defs>

  <!-- Stylized Open Book Vector -->
  <g transform="translate(116, 136)">
    <!-- Book Left Page Glow / Shadow -->
    <path d="M 140 210 Q 70 200 0 230 L 0 30 Q 70 0 140 10 Z" fill="#000000" opacity="0.3" transform="translate(5, 8)" />
    
    <!-- Book Right Page Glow / Shadow -->
    <path d="M 140 210 Q 210 200 280 230 L 280 30 Q 210 0 140 10 Z" fill="#000000" opacity="0.3" transform="translate(5, 8)" />

    <!-- Left Page Base -->
    <path d="M 140 210 Q 70 200 0 230 L 0 30 Q 70 0 140 10 Z" fill="url(#gold-secondary)" />
    
    <!-- Right Page Base -->
    <path d="M 140 210 Q 210 200 280 230 L 280 30 Q 210 0 140 10 Z" fill="url(#gold-primary)" />
    
    <!-- Central Book Binding / spine effect -->
    <path d="M 136 10 L 144 10 L 144 212 L 136 212 Z" fill="#4d3b1e" opacity="0.5" />
    
    <!-- Left Inner Page Lines (Minimalist bookmarks) -->
    <path d="M 30 65 Q 85 45 120 50" stroke="#121214" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25" />
    <path d="M 30 105 Q 85 85 120 90" stroke="#121214" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25" />
    <path d="M 30 145 Q 85 125 120 130" stroke="#121214" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25" />

    <!-- Right Inner Page Lines (Minimalist bookmarks) -->
    <path d="M 250 65 Q 195 45 160 50" stroke="#121214" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25" />
    <path d="M 250 105 Q 195 85 160 90" stroke="#121214" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25" />
    <path d="M 250 145 Q 195 125 160 130" stroke="#121214" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.25" />

    <!-- Stylized V Letter overlay in center (resembling bird flight/knowledge wings) -->
    <path d="M 100 120 L 140 150 L 180 120" stroke="url(#gold-primary)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- App Name Label Mini Text (elegant Serif under the icon) -->
  <text x="256" y="440" font-family="'Georgia', serif" font-size="32" font-weight="bold" fill="#e2b874" text-anchor="middle" letter-spacing="4">BOOKVERSE</text>
</svg>
